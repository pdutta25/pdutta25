<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0907"/>
      <stop offset="100%" stop-color="#1e1008"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#FFAB40" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFAB40" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFAB40" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#FF6B35" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="avatarring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <clipPath id="avatarclip">
      <circle cx="96" cy="140" r="52"/>
    </clipPath>
  </defs>

  <rect width="680" height="280" fill="url(#bg)"/>
  <ellipse cx="580" cy="60" rx="200" ry="120" fill="#FF6B35" opacity="0.06"/>
  <ellipse cx="100" cy="200" rx="150" ry="100" fill="#FFAB40" opacity="0.04"/>
  <rect x="0" y="110" width="680" height="60" fill="url(#glow)" opacity="0.8"/>

  <!-- Avatar -->
  <circle cx="96" cy="140" r="56" fill="none" stroke="url(#avatarring)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="96" cy="140" r="58" fill="none" stroke="#FFAB40" stroke-width="0.5" opacity="0.3"/>
  <image href="avatar.jpg" x="44" y="88" width="104" height="104" clip-path="url(#avatarclip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Name — bigger, handle goes to right -->
  <text x="176" y="118" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#f5e6d8" letter-spacing="-1">Pinak</text>
  <text x="176" y="140" font-family="Georgia, serif" font-size="12" fill="#FFAB40" opacity="0.5" letter-spacing="2">@pdutta25</text>

  <!-- Tagline — two lines, larger -->
  <text x="176" y="163" font-family="Georgia, serif" font-size="14" fill="#f5e6d8" opacity="0.82">Product mind. Builder hands. &nbsp;·&nbsp; (10k ft to 10 ft)</text>

  <!-- Divider -->
  <rect x="176" y="176" width="440" height="0.8" fill="url(#line)"/>

  <!-- Just a problem solver -->
  <text x="176" y="194" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#FFAB40" opacity="0.6" letter-spacing="1.2">Just a problem solver.</text>

  <!-- Badge — full width use, font 11 -->
  <rect x="176" y="210" width="450" height="24" rx="5" fill="#FFAB40" fill-opacity="0.07" stroke="#FFAB40" stroke-opacity="0.18" stroke-width="0.8"/>
  <text x="188" y="226" font-family="Georgia, serif" font-size="11" fill="#a07858">🧩  Living by Anthropic's belief —</text>
  <text x="372" y="226" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#FFAB40"> AI is for problem solvers.</text>

  <!-- Bottom line -->
  <rect x="0" y="277" width="680" height="1" fill="url(#line)" opacity="0.5"/>

  <!-- Decorative dots right side -->
  <circle cx="630" cy="75"  r="2"   fill="#FFAB40" opacity="0.35"/>
  <circle cx="648" cy="92"  r="1.5" fill="#FF6B35" opacity="0.28"/>
  <circle cx="658" cy="68"  r="1"   fill="#FFD166" opacity="0.28"/>
  <circle cx="618" cy="98"  r="1.5" fill="#FFAB40" opacity="0.22"/>
  <circle cx="662" cy="108" r="1"   fill="#FF6B9D" opacity="0.18"/>
  <circle cx="638" cy="118" r="2.5" fill="#FF6B35" opacity="0.12"/>

</svg>